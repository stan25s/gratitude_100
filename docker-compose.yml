services:
  db:
    image: postgres:15
    container_name: gratitude100_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gratitude
      POSTGRES_PASSWORD: gratitude_pass
      POSTGRES_DB: gratitude_db
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gratitude"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: